name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          echo "Starting npm install..."
          npm install
          echo "npm install completed"

      - name: Build
        run: |
          echo "Starting build..."
          npm run build
          echo "Build completed"
          ls -la out/

      - name: Copy CNAME
        run: |
          echo "Copying CNAME..."
          cp CNAME out/
          echo "CNAME copied"
          ls -la out/

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
          clean-exclude: |
            CNAME 